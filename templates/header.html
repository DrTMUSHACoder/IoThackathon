<header class="global-navbar">
    
    <!-- LEFT ALIGNED - NAVIGATION -->
    <div style="display: flex; gap: 12px; align-items: center; justify-self: start;">
        <div style="display: flex; flex-direction: column; line-height: 1.2; margin-right: 16px;">
            <span style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--primary-neon);">⚡ PRAKALP 2026</span>
            <span style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">Evaluation Framework</span>
        </div>
        
        <a href="/" class="btn-secondary" style="font-size: 0.82rem; padding: 6px 14px; text-decoration: none; border-radius: 6px;">
            🏆 Top 5 Hub
        </a>
        
        <a href="/admin" class="btn-secondary" style="font-size: 0.82rem; padding: 6px 14px; text-decoration: none; border-color: var(--primary-neon); color: var(--primary-neon); border-radius: 6px;">
            ⚙️ Evaluation Portal
        </a>
    </div>

    <!-- CENTER ALIGNED - COLLEGE BRANDING -->
    <a href="/" class="global-navbar-brand" style="justify-self: center;">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="RCE Logo" onerror="this.style.display='none'" style="height: 48px; width: auto; object-fit: contain;">
        <div class="rce-brand-text">
            <span class="rce-title">RAMACHANDRA</span>
            <span class="rce-subtitle">College of Engineering <span style="color: #e74c3c;">Autonomous</span></span>
        </div>
    </a>
    
    <!-- RIGHT ALIGNED - ADMIN ACTIONS & THEME -->
    <div style="display: flex; align-items: center; gap: 16px; justify-self: end;">
        
        {% if session.get('admin_logged_in') %}
            <!-- Contextual Dashboard Tools natively bound if inside Admin -->
            {% if request.endpoint == 'admin' %}
            <button onclick="saveScores()" id="saveBtn" class="btn-primary" style="padding: 6px 14px; font-size: 0.85rem; border-radius: 6px;">
                💾 Save Matrix
            </button>
            {% endif %}
            
            <!-- Global Logout is universal across all pages if Logged in -->
            <a href="/logout" class="btn-secondary" style="border-color: var(--error); color: var(--error); padding: 6px 14px; font-size: 0.82rem; text-decoration: none; border-radius: 6px;">
                🚪 Logout
            </a>
            
        {% else %}
        
            <!-- Non-authorized state prompts login context visually -->
            <a href="/login" class="btn-primary" style="background: var(--surface-dark); border: 1px solid var(--glass-border); color: var(--text-primary); padding: 6px 14px; font-size: 0.82rem; text-decoration: none; border-radius: 6px;">
                🔑 Admin Access
            </a>
            
        {% endif %}
        
        <!-- Theme logic is universally active inside the DOM state everywhere -->
        <select id="themeSelector" onchange="changeTheme(this.value)" style="background: rgba(255, 255, 255, 0.05); border: 1.5px solid var(--glass-border); color: var(--text-primary); border-radius: 6px; width: auto; padding: 6px 10px; font-size: 0.8rem; font-weight: 500; cursor: pointer;">
            <option value="neon-blue">🔵 Neon Blue</option>
            <option value="cyber-purple">🟣 Cyber Purple</option>
            <option value="matrix-green">🟢 Matrix Green</option>
            <option value="sunset-orange">🟠 Sunset Orange</option>
        </select>
        
    </div>
</header>
